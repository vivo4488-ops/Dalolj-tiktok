<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Tiktok Rádió</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎧 Tiktok Rádió</h1>

<!-- SZÍVKÜLDI -->
<section>
    <h2>💌 Szívküldi</h2>
    <input id="messageInput" placeholder="Írd ide az üzenetet">
    <button onclick="sendMessage()">Küldés</button>
</section>

<!-- ZENEKÉRÉS -->
<section>
    <h2>🎵 Zenekérés</h2>
    <input id="songInput" placeholder="Milyen számot kérsz?">
    <button onclick="requestSong()">Kérés</button>
</section>

<!-- SZAVAZÁS -->
<section>
    <h2>📊 Szavazás</h2>
    <button onclick="vote('A')">A</button>
    <button onclick="vote('B')">B</button>
    <p id="result"></p>
</section>

<script src="script.js"></script>

</body>
</html>
