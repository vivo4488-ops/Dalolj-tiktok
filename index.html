<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

header {
  background: #ff0050;
  padding: 20px;
  text-align: center;
  font-size: 24px;
}

section {
  background: #151515;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

button {
  background: #ff0050;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  margin: 5px;
}

input, textarea {
  width: 100%;
  padding: 8px;
}
</style>
</head>

<body>

<header>🎧 TikTok Rádió</header>

<!-- 📅 TEMATIKA -->
<section>
<h2>📅 Mai tematika</h2>
<div id="schedule"></div>
</section>

<!-- 🎵 ZENE -->
<section>
<h2>🎵 Zenekérés</h2>
<input id="song">
<button onclick="sendSong()">Küldés</button>
</section>

<!-- 💬 ÜZENET -->
<section>
<h2>💬 Üzenet</h2>
<textarea id="msg"></textarea>
<button onclick="sendMsg()">Küldés</button>
</section>

<!-- 🗳 SZAVAZÁS -->
<section>
<h2>🗳 Szavazás</h2>
<p id="q"></p>
<div id="opts"></div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXaLcFO9bcm7DMn6UcYLFTQTlzhXhwiT0",
  authDomain: "tiktok-radi.firebaseapp.com",
  projectId: "tiktok-radi",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ZENE */
function sendSong(){
db.collection("songs").add({song: song.value});
song.value="";
}

/* ÜZENET */
function sendMsg(){
db.collection("messages").add({text: msg.value});
msg.value="";
}

/* TEMATIKA */
async function loadSchedule(){
schedule.innerHTML = "";
let snap = await db.collection("schedule").get();

snap.forEach(d=>{
let div = document.createElement("div");
div.innerText = d.data().time + " - " + d.data().text;
schedule.appendChild(div);
});
}

/* SZAVAZÁS */
async function loadPoll(){
let d = await db.collection("fixed").doc("main").get();
let data = d.data();

q.innerText = data.q;

for(let k in data.o){
let b = document.createElement("button");
b.innerText = k + " (" + data.o[k] + ")";
b.onclick = async ()=>{
data.o[k]++;
await db.collection("fixed").doc("main").update({o:data.o});
loadPoll();
};
opts.appendChild(b);
}
}

loadSchedule();
loadPoll();
</script>

</body>
</html>
