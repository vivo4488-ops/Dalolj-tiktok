<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#001f4d;
  color:white;
  text-align:center;
}

h1{margin-top:20px;}

.box{
  background:#002b80;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

input, textarea{
  width:80%;
  padding:10px;
  margin:10px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px 20px;
  border:none;
  background:#00ccff;
  cursor:pointer;
  border-radius:5px;
}
</style>

</head>

<body>

<h1>🎧 TikTok Rádió Lacival</h1>

<div class="box">
<h2>📩 Üzenet</h2>
<textarea id="msg"></textarea><br>
<button onclick="sendMessage()">Küldés</button>
</div>

<div class="box">
<h2>🎵 Zenekérés</h2>
<input id="song"><br>
<button onclick="requestSong()">Kérés</button>
</div>

<div class="box">
<h2>📞 Kapcsolat</h2>
<p>kohegyim44@gmail.com</p>
</div>

<script>
function sendMessage(){
  const msg=document.getElementById("msg").value;
  if(!msg) return alert("Írj valamit");

  let m=JSON.parse(localStorage.getItem("m")||"[]");
  m.push(msg);
  localStorage.setItem("m",JSON.stringify(m));

  alert("OK");
  document.getElementById("msg").value="";
}

function requestSong(){
  const song=document.getElementById("song").value;
  if(!song) return alert("Írj zenét");

  let s=JSON.parse(localStorage.getItem("s")||"[]");
  s.push(song);
  localStorage.setItem("s",JSON.stringify(s));

  alert("OK");
  document.getElementById("song").value="";
}
</script>

</body>
</html>
