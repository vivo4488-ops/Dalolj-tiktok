<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>TikTok Rádió Lacival</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎧 TikTok Rádió Lacival</h1>
    <p id="topic">Mai műsor betöltése...</p>
</header>

<section class="card">
    <h2>🔴 LIVE</h2>
    <p id="status">⚫ Nincs élő adás</p>
    <a href="https://tiktok.com" target="_blank" class="live-btn">🎥 TikTok LIVE</a>
</section>

<section class="card">
    <h2>📊 Szavazás</h2>
    <p id="voteTopic">Téma betöltése...</p>

    <button onclick="vote('A')">A</button>
    <button onclick="vote('B')">B</button>

    <p id="result">Szavazatok: 0 - 0</p>
</section>

<script src="script.js"></script>
</body>
</html>
