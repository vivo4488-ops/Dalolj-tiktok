<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió Lacival</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background: radial-gradient(circle,#0a1a3a,#000);
}

h1{margin-top:15px;}

#live{
font-size:28px;
margin:15px auto;
padding:20px;
width:80%;
border-radius:15px;
background:#222;
}

.onair{
background:red;
box-shadow:0 0 25px red;
}

.offair{
background:#333;
}

section{
margin:15px auto;
width:90%;
max-width:750px;
padding:15px;
background:rgba(255,255,255,0.06);
border-radius:12px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00aaff;
color:white;
}

input,textarea{
width:90%;
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

.box{
background:rgba(255,255,255,0.1);
padding:8px;
margin:5px;
border-radius:8px;
text-align:left;
}
</style>
</head>

<body>

<h1>🎧 TikTok Rádió Lacival</h1>

<div id="live" class="offair">⚫ OFF AIR</div>

<!-- BEMUTATKOZÁS -->
<section>
<h2>📢 Bemutatkozás</h2>
<p>
TikTok Rádió Lacival 🎙️ – közösségi rádió, ahol a hallgatók is szerepet kapnak.
</p>
</section>

<!-- ÜZENETKÜLDÉS -->
<section>
<h2>💬 Üzenetküldés</h2>

<input id="name" placeholder="Neved"><br>
<textarea id="msg" placeholder="Üzeneted"></textarea><br>

<button onclick="sendMsg()">Küldés</button>
</section>

<!-- ÜZENETEK LISTÁJA -->
<section>
<h2>📨 Beérkezett üzenetek</h2>
<div id="messages"></div>
</section>

<script>

/* LIVE */
let live=false;

function updateLive(){
let el=document.getElementById("live");

if(live){
el.innerHTML="🔴 ON AIR";
el.className="onair";
}else{
el.innerHTML="⚫ OFF AIR";
el.className="offair";
}
}
updateLive();

/* ÜZENET KÜLDÉS */
function sendMsg(){

let nameVal=document.getElementById("name").value;
let msgVal=document.getElementById("msg").value;

if(!nameVal || !msgVal){
alert("Minden mezőt tölts ki!");
return;
}

let msgs=JSON.parse(localStorage.getItem("messages"))||[];

msgs.push({
name:nameVal,
msg:msgVal,
time:new Date().toLocaleString()
});

localStorage.setItem("messages",JSON.stringify(msgs));

document.getElementById("msg").value="";

loadMessages();

alert("Üzenet elküldve ✔");
}

/* ÜZENETEK BETÖLTÉSE */
function loadMessages(){

let msgs=JSON.parse(localStorage.getItem("messages"))||[];
let box=document.getElementById("messages");

box.innerHTML="";

if(msgs.length===0){
box.innerHTML="Nincs még üzenet";
return;
}

msgs.reverse().forEach(m=>{
box.innerHTML+=`
<div class="box">
<b>${m.name}</b> <small>${m.time}</small><br>
${m.msg}
</div>
`;
});
}

loadMessages();

</script>

</body>
</html>
