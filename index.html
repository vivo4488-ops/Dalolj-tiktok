<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

header {
  background: #ff0050;
  padding: 20px;
  text-align: center;
  font-size: 24px;
}

section {
  background: #151515;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

button {
  background: #ff0050;
  color: white;
  border: none;
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  background: #222;
  color: white;
  border: none;
}
</style>
</head>

<body>

<header>🎧 TikTok Rádió</header>

<!-- 📌 LEÍRÁS -->
<section>
<h2>📌 Információ</h2>
<p>
Ez a TikTok Rádió vendég oldala.<br><br>

Itt tudsz zenét kérni, üzenetet küldeni és szavazni.
Az üzenetek élő adásban felolvasásra kerülnek.
</p>
</section>

<!-- 📩 ELÉRHETŐSÉG -->
<section>
<h2>📩 Elérhetőség</h2>
<p>Reklám / együttműködés:</p>
<b>kohegyim44@gmail.com</b>
</section>

<!-- 📅 TEMATIKA -->
<section>
<h2>📅 Mai tematika</h2>
<div id="schedule"></div>
</section>

<!-- 🎵 ZENE -->
<section>
<h2>🎵 Zenekérés</h2>
<input id="song">
<button onclick="sendSong()">Küldés</button>
</section>

<!-- 💬 ÜZENET -->
<section>
<h2>💬 Üzenet</h2>
<textarea id="msg"></textarea>
<button onclick="sendMsg()">Küldés</button>
</section>

<!-- 🗳 FIX SZAVAZÁS -->
<section>
<h2>🗳 Fix szavazás</h2>
<p id="fixedQ"></p>
<div id="fixedOpts"></div>
</section>

<!-- 📊 NAPI SZAVAZÁS -->
<section>
<h2>📊 Napi szavazás</h2>
<p id="dailyQ"></p>
<div id="dailyOpts"></div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXaLcFO9bcm7DMn6UcYLFTQTlzhXhwiT0",
  authDomain: "tiktok-radi.firebaseapp.com",
  projectId: "tiktok-radi",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🎵 ZENE */
function sendSong(){
db.collection("songs").add({song:song.value});
song.value="";
}

/* 💬 ÜZENET */
function sendMsg(){
db.collection("messages").add({text:msg.value});
msg.value="";
}

/* 📅 TEMATIKA */
async function loadSchedule(){
schedule.innerHTML="";
let snap=await db.collection("schedule").get();

snap.forEach(d=>{
let div=document.createElement("div");
div.innerText=d.data().time+" - "+d.data().text;
schedule.appendChild(div);
});
}

/* 🗳 FIX SZAVAZÁS */
async function loadFixed(){
let doc=await db.collection("fixed").doc("main").get();
let d=doc.data();

if(!d) return;

fixedQ.innerText=d.q||"";
fixedOpts.innerHTML="";

for(let k in (d.o||{})){
let b=document.createElement("button");
b.innerText=k+" ("+d.o[k]+")";
b.onclick=async()=>{
d.o[k]++;
await db.collection("fixed").doc("main").update({o:d.o});
loadFixed();
};
fixedOpts.appendChild(b);
}
}

/* 📊 NAPI SZAVAZÁS */
async function loadDaily(){
let doc=await db.collection("daily").doc("main").get();
let d=doc.data();

if(!d) return;

dailyQ.innerText=d.q||"";
dailyOpts.innerHTML="";

for(let k in (d.o||{})){
let b=document.createElement("button");
b.innerText=k+" ("+d.o[k]+")";
b.onclick=async()=>{
d.o[k]++;
await db.collection("daily").doc("main").update({o:d.o});
loadDaily();
};
dailyOpts.appendChild(b);
}
}

/* INIT */
sendSong;
sendMsg;
loadSchedule();
loadFixed();
loadDaily();

</script>

</body>
</html>
