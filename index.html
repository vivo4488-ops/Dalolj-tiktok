<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió</title>

<style>
body {
    background: linear-gradient(135deg, #0a0f2c, #1a2a6c);
    color: white;
    font-family: Arial;
    text-align: center;
}

/* LIVE jelzés */
#liveStatus {
    font-size: 24px;
    margin: 20px;
    padding: 10px;
    border-radius: 10px;
}

.live {
    background: red;
    animation: glow 1s infinite alternate;
}

.offline {
    background: gray;
}

@keyframes glow {
    from { box-shadow: 0 0 10px red; }
    to { box-shadow: 0 0 30px red; }
}

/* hullám animáció */
.wave {
    width: 100%;
    height: 50px;
    background: linear-gradient(90deg, red, transparent);
    animation: waveMove 2s infinite linear;
}

@keyframes waveMove {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
}

input, textarea {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}
button {
    padding: 10px 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🎧 TikTok Rádió</h1>

<div id="liveStatus" class="offline">🔴 NINCS ÉLŐ ADÁS</div>

<div class="wave"></div>

<p>
Ez a TikTok Rádió! 🎶<br>
Zene, szavazás, interakció – TE is része vagy!
</p>

<hr>

<h2>💬 Üzenj a rádiónak</h2>

<input id="msgName" placeholder="Neved"><br>
<textarea id="msgText" placeholder="Üzeneted"></textarea><br>
<button onclick="sendMessage()">Küldés</button>

<p id="msgStatus"></p>

<script>
function sendMessage() {
    const name = document.getElementById("msgName").value;
    const text = document.getElementById("msgText").value;

    if (!name || !text) {
        document.getElementById("msgStatus").innerText = "Tölts ki minden mezőt!";
        return;
    }

    let messages = JSON.parse(localStorage.getItem("radioMessages")) || [];

    messages.push({
        name: name,
        text: text,
        time: new Date().toLocaleString()
    });

    localStorage.setItem("radioMessages", JSON.stringify(messages));

    document.getElementById("msgStatus").innerText = "Elküldve! 🎧";

    document.getElementById("msgName").value = "";
    document.getElementById("msgText").value = "";
}

/* LIVE állapot betöltése */
function loadLive() {
    const isLive = localStorage.getItem("radioLive");

    const el = document.getElementById("liveStatus");

    if (isLive === "true") {
        el.innerText = "🔴 ÉLŐ ADÁS MOST!";
        el.className = "live";
    } else {
        el.innerText = "🔴 NINCS ÉLŐ ADÁS";
        el.className = "offline";
    }
}

loadLive();
</script>

</body>
</html>
