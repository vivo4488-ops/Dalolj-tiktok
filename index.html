<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió Lacival</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(270deg,#001f4d,#003366,#001f4d);
  background-size: 600% 600%;
  animation: bg 15s infinite;
  color:white;
  text-align:center;
}

@keyframes bg {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

h1 {margin-top:20px;}

#onair {
  font-size:40px;
  margin:20px;
  text-shadow:0 0 20px red;
}

.box {
  background: rgba(255,255,255,0.05);
  padding:15px;
  margin:15px;
  border-radius:15px;
}

input,button {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}
button {
  background:#00ccff;
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎧 TikTok Rádió Lacival</h1>

<div id="onair">Betöltés...</div>

<div class="box">
<h3>📻 Bemutatkozás</h3>
<p>
Ez a TikTok rádió élő műsorokkal, zenekéréssel, üzenetekkel és szavazásokkal!
Élő adás TikTokon!
</p>
</div>

<div class="box">
<h3>🗳 Fix szavazás</h3>
<button onclick="voteFixed('A')">A</button>
<button onclick="voteFixed('B')">B</button>
</div>

<div class="box">
<h3>🔥 Napi szavazás</h3>
<button onclick="voteDaily('1')">1</button>
<button onclick="voteDaily('2')">2</button>
</div>

<div class="box">
<h3>💌 Üzenet küldése</h3>
<input id="msg" placeholder="Írd ide...">
<button onclick="sendMessage()">Küldés</button>
</div>

<div class="box">
<h3>🎵 Zenekérés</h3>
<input id="song" placeholder="Dal címe...">
<button onclick="requestSong()">Küldés</button>
</div>

<div class="box">
<h3>📩 Elérhetőség</h3>
<p>kohegyim44@gmail.com</p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// 🔴 IDE MÁSOLD A SAJÁTOD!
const firebaseConfig = {
  apiKey: "IDE",
  authDomain: "IDE",
  databaseURL: "IDE",
  projectId: "IDE",
  storageBucket: "IDE",
  messagingSenderId: "IDE",
  appId: "IDE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ON AIR
db.ref("onAir").on("value", snap=>{
  const el = document.getElementById("onair");
  if(snap.val()){
    el.innerText="🔴 ON AIR";
  } else {
    el.innerText="⚫ OFF AIR";
  }
});

// SZAVAZÁS
function voteFixed(v){
  db.ref("votes/fixed/"+v).transaction(n=>(n||0)+1);
}

function voteDaily(v){
  db.ref("votes/daily/"+v).transaction(n=>(n||0)+1);
}

// ÜZENET
function sendMessage(){
  const msg=document.getElementById("msg").value;
  db.ref("messages").push({text:msg});
  alert("Elküldve!");
}

// ZENE
function requestSong(){
  const song=document.getElementById("song").value;
  db.ref("songs").push({text:song});
  alert("Elküldve!");
}
</script>

</body>
</html>
