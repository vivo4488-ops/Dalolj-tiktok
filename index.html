<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>TikTok Rádió Lacival</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎧 TikTok Rádió Lacival</h1>
    <p>Élő műsor • Közösség • Zene</p>

    <!-- 🎤 HANGHULLÁM ANIMÁCIÓ -->
    <div class="equalizer">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</header>

<!-- 🔴 LIVE -->
<section class="card live">
    <h2>🔴 LIVE állapot</h2>
    <p id="status">⚫ Jelenleg nincs élő adás</p>

    <button onclick="toggleLive()">LIVE kapcsoló</button>

    <br>

    <a class="live-btn"
       href="https://tiktok.com"
       target="_blank">
       🎥 Belépés a TikTok LIVE-ba
    </a>
</section>

<!-- 📅 MŰSOR -->
<section class="card">
    <h2>📅 Mai műsor</h2>
    <p><strong>13:00</strong> – 90-es évek magyar zenéi</p>
    <p><strong>14:00</strong> – 💌 Szívküldi + üzenetek</p>
    <p><strong>16:00</strong> – 🎵 Kért zenék</p>
</section>

<!-- 📊 SZAVAZÁS -->
<section class="card">
    <h2>📊 Szavazás</h2>

    <button onclick="vote('A')">Pop</button>
    <button onclick="vote('B')">Rap</button>

    <p id="result">Szavazatok: még nincs</p>
</section>

<!-- 🎵 ZENEKÉRÉS -->
<section class="card">
    <h2>🎵 Zenekérés</h2>

    <input id="songInput" placeholder="Kért zene...">
    <button onclick="requestSong()">Küldés</button>

    <ul id="songList"></ul>
</section>

<!-- 💌 SZÍVKÜLDI -->
<section class="card">
    <h2>💌 Szívküldi üzenet</h2>

    <input id="msgInput" placeholder="Üzenet...">
    <button onclick="sendMessage()">Küldés</button>

    <ul id="msgList"></ul>
</section>

<script src="script.js"></script>
</body>
</html>
