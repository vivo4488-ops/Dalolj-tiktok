<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió Lacival</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(270deg, #001f4d, #003399, #001f4d);
  background-size: 600% 600%;
  animation: bgMove 10s infinite;
  color:white;
  text-align:center;
}

@keyframes bgMove {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

#onair {
  font-size:40px;
  margin:20px;
  text-shadow: 0 0 20px red;
}

.box {
  background: rgba(255,255,255,0.1);
  margin:20px;
  padding:20px;
  border-radius:15px;
}

input, textarea {
  width:80%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00ccff;
  color:black;
  cursor:pointer;
}

.wave {
  height:50px;
  margin-top:20px;
}

.bar {
  width:5px;
  height:20px;
  display:inline-block;
  margin:2px;
  background:white;
  animation:wave 1s infinite;
}

@keyframes wave {
  0%{height:10px}
  50%{height:40px}
  100%{height:10px}
}
</style>

</head>

<body>

<h1>🎧 TikTok Rádió Lacival</h1>

<div id="onair">🔴 ON AIR</div>

<div class="wave">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div>
</div>

<div class="box">
<h2>📩 Üzenet küldése</h2>
<textarea id="msg"></textarea><br>
<button onclick="sendMessage()">Küldés</button>
</div>

<div class="box">
<h2>🎵 Zenekérés</h2>
<input id="song"><br>
<button onclick="requestSong()">Kérés</button>
</div>

<div class="box">
<h2>📞 Kapcsolat</h2>
<p>Email: kohegyim44@gmail.com</p>
</div>

<script>
function sendMessage(){
  const msg = document.getElementById("msg").value;
  if(!msg) return alert("Írj valamit!");

  let messages = JSON.parse(localStorage.getItem("messages") || "[]");
  messages.push({text: msg, time: new Date().toLocaleString()});
  localStorage.setItem("messages", JSON.stringify(messages));

  alert("Elmentve!");
  document.getElementById("msg").value="";
}

function requestSong(){
  const song = document.getElementById("song").value;
  if(!song) return alert("Írj zenét!");

  let songs = JSON.parse(localStorage.getItem("songs") || "[]");
  songs.push({text: song, time: new Date().toLocaleString()});
  localStorage.setItem("songs", JSON.stringify(songs));

  alert("Elmentve!");
  document.getElementById("song").value="";
}
</script>

</body>
</html>
