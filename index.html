<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>TikTok Rádió Lacival</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎧 TikTok Rádió Lacival</h1>
    <p>Élő műsor • Közösség • Zene</p>
</header>

<!-- LIVE PANEL -->
<section class="card live">
    <h2>🔴 LIVE állapot</h2>
    <p id="status">⚫ Jelenleg nincs élő adás</p>

    <button onclick="toggleLive()">LIVE kapcsoló</button>

    <a class="live-btn"
       href="https://tiktok.com"
       target="_blank">
       🎥 Belépés a TikTok LIVE-ba
    </a>
</section>

<!-- MŰSOR -->
<section class="card">
    <h2>📅 Mai műsor</h2>

    <div class="program">
        <p><strong>13:00</strong> – 🇭🇺 90-es évek magyar zenéi</p>
        <p><strong>14:00</strong> – 💌 Szívküldi + zenék beolvasása</p>
        <p><strong>16:00</strong> – 🎵 Kért zenék lejátszása</p>
    </div>
</section>

</body>

<script src="script.js"></script>
</html>
