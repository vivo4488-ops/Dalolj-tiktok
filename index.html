<!DOCTYPE html>
<html lang="hu">
<head>

    <title>Tiktok Rádió</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <h2 class="logo">🎵 Rádió</h2>
    <ul>

        <li><a href="#">Rólunk</a></li>

</nav>

<!-- HERO -->

</html>
