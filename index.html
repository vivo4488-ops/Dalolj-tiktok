<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: linear-gradient(270deg,#001f4d,#0033cc,#000);
  background-size:400% 400%;
  animation:bg 18s ease infinite;
}

@keyframes bg {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.box {
  background:rgba(255,255,255,0.1);
  margin:20px;
  padding:20px;
  border-radius:15px;
}

input, textarea {
  width:80%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00ccff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎧 TikTok Rádió Lacival</h1>

<div class="box">
<h2>📩 Üzenet</h2>
<textarea id="msg"></textarea><br>
<button onclick="send('message')">Küldés</button>
</div>

<div class="box">
<h2>🎵 Zenekérés</h2>
<input id="song"><br>
<button onclick="send('song')">Kérés</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxmW5sHGEYVeoneaGPEoK4w8FlazjOblmOjQelxeAfITT1lU4aZ_0MHd_Vujq9Q9rftpg/exec";

function send(type){
  let text = type==="message"
    ? document.getElementById("msg").value
    : document.getElementById("song").value;

  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      type,
      text
    })
  });

  alert("Elküldve!");
}

</script>

</body>
</html>
