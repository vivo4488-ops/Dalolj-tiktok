<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: linear-gradient(270deg,#001133,#0033cc,#000);
  background-size:400% 400%;
  animation:bg 15s ease infinite;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.box{
  background:rgba(255,255,255,0.08);
  margin:15px;
  padding:15px;
  border-radius:15px;
}

#onair{
  font-size:40px;
  font-weight:bold;
  text-shadow:0 0 20px red;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00ccff;
  cursor:pointer;
  margin:5px;
}

input,textarea{
  width:80%;
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<h1>🎧 TikTok Rádió</h1>

<div id="onair">🔴 ON AIR</div>

<div class="box">
<h2>📻 Rádió leírás</h2>
<p>Interaktív rádió: üzenet, zene, szavazás, tematika.</p>
</div>

<div class="box">
<h2>📅 Tematika</h2>
<div id="theme">Betöltés...</div>
</div>

<div class="box">
<h2>📩 Üzenet</h2>
<textarea id="msg"></textarea><br>
<button onclick="send('message')">Küldés</button>
</div>

<div class="box">
<h2>🎵 Zenekérés</h2>
<input id="song"><br>
<button onclick="send('song')">Kérés</button>
</div>

<div class="box">
<h2>🗳 FIX SZAVAZÁS</h2>
<button onclick="vote('A')">A opció</button>
<button onclick="vote('B')">B opció</button>
<div id="fixedResult"></div>
</div>

<div class="box">
<h2>🗳 NAPI SZAVAZÁS</h2>
<div id="dailyQuestion">Betöltés...</div>
<button onclick="voteDaily('A')">A</button>
<button onclick="voteDaily('B')">B</button>
</div>

<div class="box">
<h2>📞 Kapcsolat</h2>
<p>kohegyim44@gmail.com</p>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxmW5sHGEYVeoneaGPEoK4w8FlazjOblmOjQelxeAfITT1lU4aZ_0MHd_Vujq9Q9rftpg/exec";

// Üzenet + zene
function send(type){
  let text = type==="message"
    ? document.getElementById("msg").value
    : document.getElementById("song").value;

  fetch(API,{
    method:"POST",
    body:JSON.stringify({type,text})
  });

  alert("Elküldve!");
}

// FIX szavazás
function vote(v){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"vote_fixed",text:v})
  });
}

// NAPI szavazás
function voteDaily(v){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"vote_daily",text:v})
  });
}

// Betöltés
function load(){
  fetch(API)
  .then(r=>r.json())
  .then(data=>{

    let status="offair";
    let theme="";
    let q="";

    let a=0,b=0;

    data.forEach(r=>{
      if(r[0]==="status") status=r[1];
      if(r[0]==="theme") theme=r[1];
      if(r[0]==="daily_question") q=r[1];

      if(r[0]==="vote_fixed_A") a++;
      if(r[0]==="vote_fixed_B") b++;
    });

    document.getElementById("onair").innerText =
      status==="onair" ? "🔴 ON AIR" : "⚫ OFF AIR";

    document.getElementById("theme").innerHTML = theme;

    document.getElementById("dailyQuestion").innerHTML = q;

    document.getElementById("fixedResult").innerHTML =
      "A: "+a+" | B: "+b;
  });
}

load();
setInterval(load,5000);

</script>

</body>
</html>
