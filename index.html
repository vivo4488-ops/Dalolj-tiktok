<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  margin: 0;
}
header {
  background: #ff0050;
  padding: 20px;
  text-align: center;
  font-size: 28px;
}
section {
  padding: 20px;
  margin: 10px;
  background: #1a1a1a;
  border-radius: 10px;
}
button {
  background: #ff0050;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}
input, textarea {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}
</style>
</head>

<body>

<header>🎧 TikTok Rádió</header>

<section>
<h2>🎵 Zenekérés</h2>
<form id="songForm">
<input id="song" placeholder="Kért dal">
<button>Küldés</button>
</form>
<ul id="songs"></ul>
</section>

<section>
<h2>💬 Üzenet küldése</h2>
<form id="msgForm">
<textarea id="msg" placeholder="Üzenet"></textarea>
<button>Küldés</button>
</form>
</section>

<section>
<h2>📅 Mai tematika</h2>
<div id="schedule"></div>
</section>

<section>
<h2>📊 Szavazások</h2>
<p id="fixedQ"></p>
<div id="fixedOptions"></div>

<p id="dailyQ"></p>
<div id="dailyOptions"></div>
</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXaLcFO9bcm7DMn6UcYLFTQTlzhXhwiT0",
  authDomain: "tiktok-radi.firebaseapp.com",
  databaseURL: "https://tiktok-radi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tiktok-radi",
  storageBucket: "tiktok-radi.firebasestorage.app",
  messagingSenderId: "480663171336",
  appId: "1:480663171336:web:cf869ccc9e3e888ab3fcbd",
  measurementId: "G-S1N62DWC3X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ZENÉK */
songForm.onsubmit = async (e)=>{
e.preventDefault();
await db.collection("songs").add({
song: song.value
});
song.value="";
loadSongs();
};

async function loadSongs(){
songs.innerHTML="";
let snap = await db.collection("songs").get();
snap.forEach(d=>{
let li=document.createElement("li");
li.innerText=d.data().song;
songs.appendChild(li);
});
}
loadSongs();

/* ÜZENET */
msgForm.onsubmit = async (e)=>{
e.preventDefault();
await db.collection("messages").add({
text: msg.value
});
msg.value="";
alert("Elküldve!");
};

/* SZAVAZÁS */
async function loadPolls(){

let fixed = await db.collection("fixed").get();
fixed.forEach(d=>{
let data = d.data();
fixedQ.innerText = data.q;

for(let k in data.o){
let b=document.createElement("button");
b.innerText = k + " (" + data.o[k] + ")";
b.onclick = async ()=>{
data.o[k]++;
await db.collection("fixed").doc(d.id).update({o:data.o});
loadPolls();
};
fixedOptions.appendChild(b);
}
});

let daily = await db.collection("daily").get();
daily.forEach(d=>{
let data = d.data();
dailyQ.innerText = data.q;

for(let k in data.o){
let b=document.createElement("button");
b.innerText = k + " (" + data.o[k] + ")";
b.onclick = async ()=>{
data.o[k]++;
await db.collection("daily").doc(d.id).update({o:data.o});
loadPolls();
};
dailyOptions.appendChild(b);
}
});
}
loadPolls();

/* TEMATIKA */
async function loadSchedule(){
let q = await db.collection("schedule").get();
schedule.innerHTML="";
q.forEach(d=>{
let div=document.createElement("div");
div.innerText=d.data().time + " - " + d.data().text;
schedule.appendChild(div);
});
}
loadSchedule();

</script>

</body>
</html>
