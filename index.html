<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió Lacival</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0a0f2c,#1a2a6c);
    color:white;
    text-align:center;
}

h1{margin:20px;}

section{
    width:90%;
    max-width:700px;
    margin:20px auto;
    padding:15px;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
}

input,textarea{
    width:90%;
    padding:10px;
    margin:5px;
}

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}

.live{
    background:red;
    padding:10px;
    border-radius:10px;
    animation:glow 1s infinite alternate;
}

.off{
    background:#333;
    padding:10px;
    border-radius:10px;
}

@keyframes glow{
    from{box-shadow:0 0 10px red;}
    to{box-shadow:0 0 25px red;}
}
</style>
</head>

<body>

<h1>🎧 TikTok Rádió Lacival</h1>

<div id="liveBox" class="off">Betöltés...</div>

<section>
<h2>💬 Üzenet / Zenekérés</h2>
<input id="name" placeholder="Neved">
<textarea id="msg" placeholder="Üzenet vagy zene"></textarea>
<button onclick="send()">Küldés</button>
<p id="status"></p>
</section>

<section>
<h2>📩 Üzenetek</h2>
<div id="messages"></div>
</section>

<section>
<h2>📊 Szavazás</h2>
<button onclick="vote('igen')">Igen</button>
<button onclick="vote('nem')">Nem</button>
<button onclick="vote('jovo')">Van jövője</button>
<p id="votes"></p>
</section>

<script>

/* 🔥 FIREBASE – EZT TÖLTSD KI A SAJÁTODDAL */
const firebaseConfig = {
  apiKey: "IDE",
  authDomain: "IDE",
  databaseURL: "IDE",
  projectId: "IDE",
  storageBucket: "IDE",
  messagingSenderId: "IDE",
  appId: "IDE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LIVE STATUS (GitHub + kézi vezérlés) */
function loadLive(){
    let live = localStorage.getItem("live");
    let box = document.getElementById("liveBox");

    if(live === "true"){
        box.innerText = "🔴 ÉLŐ ADÁS MOST!";
        box.className = "live";
    } else {
        box.innerText = "⚫ NINCS ÉLŐ ADÁS";
        box.className = "off";
    }
}

/* ÜZENET KÜLDÉS */
function send(){
    let n = document.getElementById("name").value;
    let m = document.getElementById("msg").value;

    if(!n || !m){
        status.innerText = "Tölts ki mindent!";
        return;
    }

    db.ref("messages").push({
        name:n,
        msg:m,
        time:new Date().toLocaleString()
    });

    status.innerText = "Elküldve 🎧";

    document.getElementById("name").value = "";
    document.getElementById("msg").value = "";
}

/* ÜZENETEK LISTÁZÁSA */
db.ref("messages").on("value",snap=>{
    let data = snap.val();
    let box = document.getElementById("messages");
    box.innerHTML="";

    for(let id in data){
        let m = data[id];

        let d = document.createElement("div");
        d.style.border="1px solid gray";
        d.style.margin="5px";
        d.style.padding="5px";

        d.innerHTML = `<b>${m.name}</b>: ${m.msg}`;
        box.appendChild(d);
    }
});

/* SZAVAZÁS */
function vote(v){
    let data = JSON.parse(localStorage.getItem("votes")) || {igen:0,nem:0,jovo:0};
    data[v]++;
    localStorage.setItem("votes",JSON.stringify(data));

    document.getElementById("votes").innerText =
    `Igen: ${data.igen} | Nem: ${data.nem} | Van jövője: ${data.jovo}`;
}

/* INIT */
loadLive();

</script>

</body>
</html>
