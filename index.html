<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió Lacival</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1230;
color:white;
text-align:center;
}

#live{
padding:20px;
margin:15px;
border-radius:10px;
font-size:24px;
}

.on{background:red;box-shadow:0 0 20px red;}
.off{background:#333;}

section{
margin:15px auto;
width:90%;
max-width:700px;
padding:15px;
background:rgba(255,255,255,0.06);
border-radius:10px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🎧 TikTok Rádió Lacival</h1>

<div id="live" class="off">OFF AIR</div>

<section>
<h2>📢 Bemutatkozás</h2>
<p>
Élő TikTok rádió 🎙️ zenék, szavazások, üzenetek.
</p>
</section>

<section>
<h2>💬 Üzenet</h2>
<input id="name" placeholder="Név"><br>
<textarea id="msg" placeholder="Üzenet"></textarea><br>
<button onclick="sendMsg()">Küldés</button>
</section>

<script>

const firebaseConfig = {
apiKey:"YOUR",
authDomain:"YOUR",
databaseURL:"YOUR",
projectId:"YOUR",
appId:"YOUR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LIVE */
db.ref("live").on("value",snap=>{
let v=snap.val();
let el=document.getElementById("live");

if(v==="on"){
el.innerText="🔴 ON AIR";
el.className="on";
}else{
el.innerText="⚫ OFF AIR";
el.className="off";
}
});

/* ÜZENET */
function sendMsg(){
db.ref("messages").push({
name:name.value,
msg:msg.value,
time:Date.now()
});

alert("Elküldve ✔");
name.value="";
msg.value="";
}

</script>

</body>
</html>
