<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>TikTok Rádió Lacival</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background: radial-gradient(circle at top,#0a1b3d,#050816);
overflow-x:hidden;
}

/* háttér animáció */
.bg-wave{
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;
background: linear-gradient(90deg,#00c6ff33,#0072ff33,#00c6ff33);
animation:move 8s linear infinite;
z-index:-1;
}

@keyframes move{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

h1{text-align:center;margin-top:20px;}

section{
background:rgba(255,255,255,0.06);
margin:15px auto;
padding:15px;
width:90%;
max-width:700px;
border-radius:12px;
backdrop-filter: blur(10px);
}

input,textarea{
width:95%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00aaff;
color:white;
}

/* ON AIR */
#live{
text-align:center;
padding:15px;
font-size:20px;
border-radius:10px;
margin:10px;
}

.onair{
background:red;
animation:pulse 1s infinite;
}

.offair{
background:#333;
}

@keyframes pulse{
0%{box-shadow:0 0 5px red;}
100%{box-shadow:0 0 20px red;}
}

/* hullám animáció */
.wave{
height:30px;
background: repeating-linear-gradient(
90deg,
#00c6ff,
#0072ff 10px,
transparent 10px,
transparent 20px
);
animation:waveMove 1s linear infinite;
margin:10px 0;
}

@keyframes waveMove{
0%{background-position:0;}
100%{background-position:100px;}
}
</style>
</head>

<body>

<div class="bg-wave"></div>

<h1>🎧 TikTok Rádió Lacival</h1>

<div id="live" class="offair">Betöltés...</div>
<div class="wave"></div>

<!-- ISMERTETŐ -->
<section>
<h2>ℹ️ Rádió információ</h2>
<p>
Ez a <b>TikTok Rádió Lacival</b> 🎙️<br><br>
✔ élő TikTok rádió kapcsolat<br>
✔ zenekérés lehetőség<br>
✔ szívküldi üzenetek<br>
✔ napi szavazások<br>
✔ tematikus műsorok<br>
</p>
</section>

<!-- ÜZENET -->
<section>
<h2>💬 Üzenet / Szívküldi</h2>
<input id="name" placeholder="Neved">
<textarea id="msg" placeholder="Üzenet"></textarea>
<button onclick="sendMsg()">Küldés</button>
</section>

<!-- ZENEKÉRÉS -->
<section>
<h2>🎵 Zenekérés</h2>
<input id="song" placeholder="Kért zene">
<button onclick="sendSong()">Küldés</button>
</section>

<!-- SZAVAZÁS -->
<section>
<h2>📊 Szavazás</h2>
<button onclick="vote('igen')">Igen</button>
<button onclick="vote('nem')">Nem</button>
<button onclick="vote('jovo')">Van jövője</button>
<p id="votes"></p>
</section>

<!-- ELÉRHETŐSÉG -->
<section>
<h2>📞 Elérhetőség</h2>
<p>Reklám / kapcsolat: <b>radio@tiktok.hu</b></p>
</section>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "IDE",
  authDomain: "IDE",
  databaseURL: "IDE",
  projectId: "IDE",
  storageBucket: "IDE",
  messagingSenderId: "IDE",
  appId: "IDE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LIVE ON AIR */
function toggleLive(){
let live = localStorage.getItem("live");
let el = document.getElementById("live");

if(live === "true"){
el.innerText = "🔴 ON AIR LIVE";
el.className = "onair";
}else{
el.innerText = "⚫ OFF AIR";
el.className = "offair";
}
}

/* ÜZENET */
function sendMsg(){
db.ref("messages").push({
name:name.value,
msg:msg.value,
type:"message"
});
msg.value="";
}

/* ZENEKÉRÉS */
function sendSong(){
db.ref("messages").push({
name:"🎵 ZENE",
msg:song.value,
type:"song"
});
song.value="";
}

/* SZAVAZÁS */
function vote(v){
let d = JSON.parse(localStorage.getItem("vote")) || {igen:0,nem:0,jovo:0};
d[v]++;
localStorage.setItem("vote",JSON.stringify(d));

votes.innerText =
`Igen: ${d.igen} | Nem: ${d.nem} | Jövő: ${d.jovo}`;
}

/* INIT */
toggleLive();

</script>

</body>
</html>
