<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Online Rádió</title>

<style>
body{
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

.box{
  background:#1a1a1a;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

h1{color:#00ccff;}

button{
  padding:10px;
  margin:5px;
  background:#00ccff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input{
  padding:8px;
  margin:5px;
  width:70%;
}

#clock{
  font-size:22px;
  margin:10px;
}
</style>
</head>

<body>

<h1>🎧 Online Rádió</h1>

<div id="clock"></div>

<div class="box">
<h2>📻 Leírás</h2>
<p>
Interaktív rádió:
<br>• Zenekérés emailen
<br>• Hallgatói szavazás
<br>• Admin irányítja a tematikát
</p>
</div>

<div class="box">
<h2>🎵 Zenei stílus</h2>
<p id="style"></p>
</div>

<div class="box">
<h2>📅 Tematika</h2>
<p id="theme"></p>
</div>

<div class="box">
<h2>📩 Kapcsolat</h2>
<p>
<a href="mailto:kohegyim44@gmail.com">kohegyim44@gmail.com</a>
</p>
</div>

<div class="box">
<h2>🗳 FIX SZAVAZÁS</h2>
<button onclick="vote('A')">A</button>
<button onclick="vote('B')">B</button>
<p id="fixed"></p>
</div>

<div class="box">
<h2>🗳 NAPI SZAVAZÁS</h2>
<p id="dailyQ"></p>
<button onclick="voteDaily('A')">A</button>
<button onclick="voteDaily('B')">B</button>
<p id="daily"></p>
</div>

<hr>

<h2>🔐 ADMIN</h2>

<div class="box">
<input id="themeInput" placeholder="Tematika">
<button onclick="saveTheme()">Mentés</button>
</div>

<div class="box">
<input id="styleInput" placeholder="Zenei stílus">
<button onclick="saveStyle()">Mentés</button>
</div>

<div class="box">
<input id="dailyInput" placeholder="Napi kérdés">
<button onclick="saveDaily()">Mentés</button>
</div>

<div class="box">
<button onclick="reset()">Szavazás nullázás</button>
</div>

<script>

// ÓRA
function clock(){
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
}
setInterval(clock,1000);

// BETÖLTÉS
function load(){
  document.getElementById("theme").innerText =
    localStorage.getItem("theme") || "Nincs";

  document.getElementById("style").innerText =
    localStorage.getItem("style") || "Vegyes";

  document.getElementById("dailyQ").innerText =
    localStorage.getItem("dailyQ") || "Nincs kérdés";

  document.getElementById("fixed").innerText =
    (localStorage.getItem("fixedA")||0)+" / "+(localStorage.getItem("fixedB")||0);

  document.getElementById("daily").innerText =
    (localStorage.getItem("dailyA")||0)+" / "+(localStorage.getItem("dailyB")||0);
}

// MENTÉS
function saveTheme(){
  localStorage.setItem("theme",themeInput.value);
  load();
}

function saveStyle(){
  localStorage.setItem("style",styleInput.value);
  load();
}

function saveDaily(){
  localStorage.setItem("dailyQ",dailyInput.value);
  load();
}

// SZAVAZÁS
function vote(v){
  let k="fixed"+v;
  let n=parseInt(localStorage.getItem(k)||0);
  localStorage.setItem(k,n+1);
  load();
}

function voteDaily(v){
  let k="daily"+v;
  let n=parseInt(localStorage.getItem(k)||0);
  localStorage.setItem(k,n+1);
  load();
}

// RESET
function reset(){
  localStorage.setItem("fixedA",0);
  localStorage.setItem("fixedB",0);
  localStorage.setItem("dailyA",0);
  localStorage.setItem("dailyB",0);
  load();
}

load();

</script>

</body>
</html>
