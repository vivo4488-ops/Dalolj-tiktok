<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ADMIN</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

.box {
  background:#222;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🔧 ADMIN</h1>

<button onclick="loadData()">Frissítés</button>
<button onclick="clearAll()">Törlés</button>

<div class="box">
<h2>📩 Üzenetek</h2>
<div id="messages"></div>
</div>

<div class="box">
<h2>🎵 Zenék</h2>
<div id="songs"></div>
</div>

<script>
function loadData(){
  const messages = JSON.parse(localStorage.getItem("messages") || "[]");
  const songs = JSON.parse(localStorage.getItem("songs") || "[]");

  let m = "";
  messages.forEach(x=>{
    m += "<p>"+x.time+"<br>"+x.text+"</p><hr>";
  });
  document.getElementById("messages").innerHTML = m;

  let s = "";
  songs.forEach(x=>{
    s += "<p>"+x.time+"<br>"+x.text+"</p><hr>";
  });
  document.getElementById("songs").innerHTML = s;
}

function clearAll(){
  localStorage.clear();
  loadData();
}

loadData();
</script>

</body>
</html>
