<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Admin - TikTok Rádió</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
}

h1 {
  text-align: center;
}

section {
  background: #1e1e1e;
  margin: 20px;
  padding: 15px;
  border-radius: 10px;
}

.item {
  background: #2a2a2a;
  padding: 10px;
  margin: 5px 0;
  display: flex;
  justify-content: space-between;
}

button {
  background: red;
  border: none;
  color: white;
  padding: 5px;
  cursor: pointer;
}

input {
  margin: 5px;
  padding: 5px;
  width: 100%;
}
</style>
</head>

<body>

<h1>🎧 Admin panel</h1>

<!-- 🎵 ZENE -->
<section>
<h2>🎵 Zenekérések</h2>
<div id="songs"></div>
</section>

<!-- 💬 ÜZENET -->
<section>
<h2>💬 Üzenetek</h2>
<div id="messages"></div>
</section>

<!-- 🗳 FIX SZAVAZÁS -->
<section>
<h2>🗳 Fix szavazás szerkesztés</h2>

<input id="fixedQ" placeholder="Kérdés">
<input id="fixedA" placeholder="Opció A">
<input id="fixedB" placeholder="Opció B">
<button onclick="saveFixed()">Mentés</button>

<div id="fixedPreview"></div>
</section>

<!-- 📊 NAPI SZAVAZÁS -->
<section>
<h2>📊 Napi szavazás szerkesztés</h2>

<input id="dailyQ" placeholder="Kérdés">
<input id="dailyA" placeholder="Opció A">
<input id="dailyB" placeholder="Opció B">
<button onclick="saveDaily()">Mentés</button>

<div id="dailyPreview"></div>
</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXaLcFO9bcm7DMn6UcYLFTQTlzhXhwiT0",
  authDomain: "tiktok-radi.firebaseapp.com",
  databaseURL: "https://tiktok-radi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tiktok-radi",
  storageBucket: "tiktok-radi.firebasestorage.app",
  messagingSenderId: "480663171336",
  appId: "1:480663171336:web:cf869ccc9e3e888ab3fcbd",
  measurementId: "G-S1N62DWC3X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🎵 ZENE */
async function loadSongs(){
songs.innerHTML="";
let snap = await db.collection("songs").get();

snap.forEach(d=>{
let div = document.createElement("div");
div.className = "item";

div.innerHTML = `<span>${d.data().song}</span>`;

songs.appendChild(div);
});
}

/* 💬 ÜZENET */
async function loadMessages(){
messages.innerHTML="";
let snap = await db.collection("messages").get();

snap.forEach(d=>{
let div = document.createElement("div");
div.className = "item";

div.innerHTML = `<span>${d.data().text}</span>`;

messages.appendChild(div);
});
}

/* 🗳 FIX SZAVAZÁS BETÖLTÉS */
async function loadFixed(){
let snap = await db.collection("fixed").get();

snap.forEach(d=>{
let data = d.data();

fixedQ.value = data.q || "";

let keys = Object.keys(data.o || {});
fixedA.value = keys[0] || "";
fixedB.value = keys[1] || "";

fixedPreview.innerText = JSON.stringify(data.o);
});
}

/* 📊 DAILY SZAVAZÁS BETÖLTÉS */
async function loadDaily(){
let snap = await db.collection("daily").get();

snap.forEach(d=>{
let data = d.data();

dailyQ.value = data.q || "";

let keys = Object.keys(data.o || {});
dailyA.value = keys[0] || "";
dailyB.value = keys[1] || "";

dailyPreview.innerText = JSON.stringify(data.o);
});
}

/* 💾 FIX MENTÉS */
window.saveFixed = async ()=>{
let snap = await db.collection("fixed").get();

snap.forEach(async (d)=>{
await db.collection("fixed").doc(d.id).update({
q: fixedQ.value,
o: {
  [fixedA.value]: 0,
  [fixedB.value]: 0
}
});
});

loadFixed();
};

/* 💾 DAILY MENTÉS */
window.saveDaily = async ()=>{
let snap = await db.collection("daily").get();

snap.forEach(async (d)=>{
await db.collection("daily").doc(d.id).update({
q: dailyQ.value,
o: {
  [dailyA.value]: 0,
  [dailyB.value]: 0
}
});
});

loadDaily();
};

/* 🚀 INDÍTÁS */
loadSongs();
loadMessages();
loadFixed();
loadDaily();

</script>

</body>
</html>
