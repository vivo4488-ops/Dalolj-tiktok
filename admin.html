<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Admin - TikTok Rádió</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
}

h1 {
  text-align: center;
}

section {
  background: #1e1e1e;
  margin: 20px;
  padding: 15px;
  border-radius: 10px;
}

.item {
  background: #2a2a2a;
  padding: 10px;
  margin: 5px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  background: red;
  border: none;
  color: white;
  padding: 5px;
  cursor: pointer;
}

input {
  margin: 5px 0;
  padding: 5px;
  width: 100%;
}
</style>
</head>

<body>

<h1>🎧 Admin panel</h1>

<!-- 🎵 ZENE -->
<section>
<h2>🎵 Zenekérések</h2>
<div id="songs"></div>
</section>

<!-- 💬 ÜZENET -->
<section>
<h2>💬 Üzenetek</h2>
<div id="messages"></div>
</section>

<!-- 📅 TEMATIKA -->
<section>
<h2>📅 Tematika</h2>

<input id="schTime" placeholder="Idő (pl 18:00)">
<input id="schText" placeholder="Műsor neve">
<button onclick="addSchedule()">Hozzáadás</button>

<div id="scheduleList"></div>
</section>

<!-- 🗳 FIX SZAVAZÁS -->
<section>
<h2>🗳 Fix szavazás</h2>

<input id="fixedQ" placeholder="Kérdés">
<input id="fixedA" placeholder="Opció 1">
<input id="fixedB" placeholder="Opció 2">
<button onclick="saveFixed()">Mentés</button>
</section>

<!-- 📊 NAPI SZAVAZÁS -->
<section>
<h2>📊 Napi szavazás</h2>

<input id="dailyQ" placeholder="Kérdés">
<input id="dailyA" placeholder="Opció 1">
<input id="dailyB" placeholder="Opció 2">
<button onclick="saveDaily()">Mentés</button>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXaLcFO9bcm7DMn6UcYLFTQTlzhXhwiT0",
  authDomain: "tiktok-radi.firebaseapp.com",
  projectId: "tiktok-radi",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= ZENE ================= */
async function loadSongs(){
songs.innerHTML = "";

let snap = await db.collection("songs").get();

snap.forEach(d=>{
let div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<span>${d.data().song}</span>
<button onclick="deleteSong('${d.id}')">Törlés</button>
`;

songs.appendChild(div);
});
}

window.deleteSong = async (id)=>{
await db.collection("songs").doc(id).delete();
loadSongs();
};

/* ================= ÜZENET ================= */
async function loadMessages(){
messages.innerHTML = "";

let snap = await db.collection("messages").get();

snap.forEach(d=>{
let div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<span>${d.data().text}</span>
<button onclick="deleteMsg('${d.id}')">Törlés</button>
`;

messages.appendChild(div);
});
}

window.deleteMsg = async (id)=>{
await db.collection("messages").doc(id).delete();
loadMessages();
};

/* ================= TEMATIKA ================= */
async function loadSchedule(){
scheduleList.innerHTML = "";

let snap = await db.collection("schedule").get();

snap.forEach(d=>{
let div = document.createElement("div");
div.className = "item";

div.innerHTML = `
${d.data().time} - ${d.data().text}
<button onclick="deleteSchedule('${d.id}')">Törlés</button>
`;

scheduleList.appendChild(div);
});
}

window.addSchedule = async ()=>{
await db.collection("schedule").add({
time: schTime.value,
text: schText.value
});

schTime.value = "";
schText.value = "";

loadSchedule();
};

window.deleteSchedule = async (id)=>{
await db.collection("schedule").doc(id).delete();
loadSchedule();
};

/* ================= SZAVAZÁS ================= */
window.saveFixed = async ()=>{
await db.collection("fixed").doc("main").set({
q: fixedQ.value,
o: {
  [fixedA.value]: 0,
  [fixedB.value]: 0
}
});
};

window.saveDaily = async ()=>{
await db.collection("daily").doc("main").set({
q: dailyQ.value,
o: {
  [dailyA.value]: 0,
  [dailyB.value]: 0
}
});
};

/* INIT */
loadSongs();
loadMessages();
loadSchedule();

</script>

</body>
</html>
