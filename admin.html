<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ADMIN</title>

<style>
body {
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}

.box {
  background:#222;
  padding:20px;
  margin:20px 0;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:8px 15px;
  margin:5px;
  cursor:pointer;
}

.item {
  background:#333;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
}
</style>
</head>

<body>

<h1>🎛️ ADMIN PANEL</h1>

<div class="box">
<h2>🔥 Napi szavazás</h2>

<input id="q" placeholder="Kérdés">
<input id="o1" placeholder="Opció 1">
<input id="o2" placeholder="Opció 2">

<button onclick="saveDaily()">Mentés</button>
</div>

<div class="box">
<h2>📅 Tematika</h2>

<textarea id="prog" placeholder="Soronként egy műsor"></textarea>
<button onclick="saveProg()">Mentés</button>

</div>

<div class="box">
<h2>📩 Üzenetek</h2>
<div id="messages"></div>
</div>

<div class="box">
<h2>🎵 Zenekérések</h2>
<div id="songs"></div>
</div>

<script>

// ===== BETÖLTÉS =====

// napi szavazás betöltés
let daily = JSON.parse(localStorage.getItem("daily"));
if(daily){
  document.getElementById("q").value = daily.q;
  document.getElementById("o1").value = daily.options[0];
  document.getElementById("o2").value = daily.options[1];
}

// tematika betöltés
let program = JSON.parse(localStorage.getItem("program"));
if(program){
  document.getElementById("prog").value = program.join("\n");
}

// üzenetek betöltése
function loadMessages(){
  let m = JSON.parse(localStorage.getItem("m")||"[]");
  let html="";
  m.forEach((msg,i)=>{
    html += `<div class="item">${msg}
      <button onclick="delMsg(${i})">Törlés</button>
    </div>`;
  });
  document.getElementById("messages").innerHTML = html;
}

// zenék betöltése
function loadSongs(){
  let s = JSON.parse(localStorage.getItem("s")||"[]");
  let html="";
  s.forEach((song,i)=>{
    html += `<div class="item">${song}
      <button onclick="delSong(${i})">Törlés</button>
    </div>`;
  });
  document.getElementById("songs").innerHTML = html;
}

// ===== MENTÉS =====

function saveDaily(){
  let data={
    q:document.getElementById("q").value,
    options:[
      document.getElementById("o1").value,
      document.getElementById("o2").value
    ]
  };
  localStorage.setItem("daily",JSON.stringify(data));
  alert("Mentve!");
}

function saveProg(){
  let p=document.getElementById("prog").value.split("\n");
  localStorage.setItem("program",JSON.stringify(p));
  alert("Mentve!");
}

// ===== TÖRLÉS =====

function delMsg(i){
  let m = JSON.parse(localStorage.getItem("m")||"[]");
  m.splice(i,1);
  localStorage.setItem("m",JSON.stringify(m));
  loadMessages();
}

function delSong(i){
  let s = JSON.parse(localStorage.getItem("s")||"[]");
  s.splice(i,1);
  localStorage.setItem("s",JSON.stringify(s));
  loadSongs();
}

// induláskor betölt
loadMessages();
loadSongs();

</script>
<script>
const API = "https://script.google.com/macros/s/AKfycbxmW5sHGEYVeoneaGPEoK4w8FlazjOblmOjQelxeAfITT1lU4aZ_0MHd_Vujq9Q9rftpg/exec";

function load(){
  fetch(API)
  .then(r=>r.json())
  .then(data=>{
    let msg="", song="";

    data.forEach(row=>{
      if(row[0]==="message") msg += row[1]+"<br>";
      if(row[0]==="song") song += row[1]+"<br>";
    });

    document.getElementById("messages").innerHTML = msg;
    document.getElementById("songs").innerHTML = song;
  });
}
</script>
</body>
</html>
