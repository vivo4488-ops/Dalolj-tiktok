<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ADMIN</title>
</head>

<body>

<h1>ADMIN</h1>

<h2>Napi szavazás</h2>
<input id="q" placeholder="Kérdés"><br>
<input id="o1" placeholder="Opció 1"><br>
<input id="o2" placeholder="Opció 2"><br>
<button onclick="saveDaily()">Mentés</button>

<h2>Tematika</h2>
<textarea id="prog"></textarea><br>
<button onclick="saveProg()">Mentés</button>

<script>
function saveDaily(){
  let data={
    q:document.getElementById("q").value,
    options:[
      document.getElementById("o1").value,
      document.getElementById("o2").value
    ]
  };
  localStorage.setItem("daily",JSON.stringify(data));
  alert("Mentve");
}

function saveProg(){
  let p=document.getElementById("prog").value.split("\n");
  localStorage.setItem("program",JSON.stringify(p));
  alert("Mentve");
}
</script>

</body>
</html>
