<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

input {
    padding: 10px;
}

button {
    padding: 10px;
    margin: 5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>🔐 Admin belépés</h2>
    <input id="password" type="password" placeholder="Jelszó"><br><br>
    <button onclick="login()">Belépés</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">

<h1>🎛 Admin Panel</h1>

<h2>🔴 Élő adás vezérlés</h2>
<button onclick="setLive(true)">LIVE BE</button>
<button onclick="setLive(false)">LIVE KI</button>

<hr>

<h2>📩 Üzenetek</h2>
<div id="messageList"></div>

</div>

<script>
const PASSWORD = "radio123";

function login() {
    const pass = document.getElementById("password").value;

    if (pass === PASSWORD) {
        localStorage.setItem("adminAuth", "true");
        showAdmin();
    } else {
        document.getElementById("error").innerText = "Hibás jelszó!";
    }
}

function showAdmin() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadMessages();
}

function setLive(state) {
    localStorage.setItem("radioLive", state);
}

/* Üzenetek */
function loadMessages() {
    const container = document.getElementById("messageList");
    container.innerHTML = "";

    let messages = JSON.parse(localStorage.getItem("radioMessages")) || [];

    messages.reverse().forEach((msg, index) => {
        const div = document.createElement("div");

        div.style.border = "1px solid gray";
        div.style.margin = "10px";
        div.style.padding = "10px";

        div.innerHTML = `
            <b>${msg.name}</b> (${msg.time})<br>
            ${msg.text}<br><br>
            <button onclick="deleteMessage(${messages.length - 1 - index})">Törlés</button>
        `;

        container.appendChild(div);
    });
}

function deleteMessage(i) {
    let messages = JSON.parse(localStorage.getItem("radioMessages")) || [];

    messages.splice(i, 1);

    localStorage.setItem("radioMessages", JSON.stringify(messages));

    loadMessages();
}

/* AUTO LOGIN */
window.onload = function () {
    if (localStorage.getItem("adminAuth") === "true") {
        showAdmin();
    }
};
</script>

</body>
</html>
