<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN</title>
</head>
<body style="background:black;color:white;text-align:center">

<h1>ADMIN PANEL</h1>

<button onclick="setOnAir(true)">ON AIR</button>
<button onclick="setOnAir(false)">OFF AIR</button>

<h2>Üzenetek</h2>
<div id="messages"></div>

<h2>Zenék</h2>
<div id="songs"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "IDE",
  authDomain: "IDE",
  databaseURL: "IDE",
  projectId: "IDE",
  storageBucket: "IDE",
  messagingSenderId: "IDE",
  appId: "IDE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ON AIR
function setOnAir(v){
  db.ref("onAir").set(v);
}

// ÜZENETEK
db.ref("messages").on("value", snap=>{
  let html="";
  snap.forEach(c=>{
    html += "<p>"+c.val().text+"</p>";
  });
  document.getElementById("messages").innerHTML=html;
});

// ZENÉK
db.ref("songs").on("value", snap=>{
  let html="";
  snap.forEach(c=>{
    html += "<p>"+c.val().text+"</p>";
  });
  document.getElementById("songs").innerHTML=html;
});
</script>

</body>
</html>
