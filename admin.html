<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ADMIN</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}
.box{
  background:#222;
  margin:20px 0;
  padding:15px;
}
</style>

</head>

<body>

<h1>ADMIN</h1>

<button onclick="load()">Frissítés</button>
<button onclick="clearAll()">Törlés</button>

<div class="box">
<h2>Üzenetek</h2>
<div id="m"></div>
</div>

<div class="box">
<h2>Zenék</h2>
<div id="s"></div>
</div>

<script>
function load(){
  let m=JSON.parse(localStorage.getItem("m")||"[]");
  let s=JSON.parse(localStorage.getItem("s")||"[]");

  document.getElementById("m").innerHTML=m.join("<br>");
  document.getElementById("s").innerHTML=s.join("<br>");
}

function clearAll(){
  localStorage.clear();
  load();
}

load();
</script>

</body>
</html>
