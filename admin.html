<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body { background:#111; color:white; text-align:center; font-family:Arial;}
input,button{padding:10px;margin:5px;}
</style>
</head>

<body>

<div id="login">
<h2>🔐 Belépés</h2>
<input id="pass" type="password">
<button onclick="login()">OK</button>
<p id="err"></p>
</div>

<div id="panel" style="display:none;">

<h1>Admin</h1>

<!-- LIVE -->
<h2>LIVE</h2>
<button onclick="setLive(true)">BE</button>
<button onclick="setLive(false)">KI</button>

<!-- TEMATIKA -->
<h2>Tematika</h2>
<input id="from" placeholder="tól">
<input id="to" placeholder="ig">
<input id="name" placeholder="műsor">
<button onclick="add()">Hozzáad</button>
<div id="list"></div>

<!-- NAPI -->
<h2>Napi kérdés</h2>
<input id="dq" placeholder="kérdés"><br>
<input id="o1"><input id="o2"><input id="o3"><br>
<button onclick="saveDaily()">Mentés</button>

<!-- KONTAKT -->
<h2>Kapcsolat</h2>
<input id="contactInput" placeholder="email stb">
<button onclick="saveContact()">Mentés</button>

<!-- ÜZENETEK -->
<h2>Üzenetek</h2>
<div id="msgs"></div>

</div>

<script>
const P="radio123";

function login(){
 if(pass.value===P){
  localStorage.setItem("admin","1");
  show();
 } else err.innerText="Hibás";
}

function show(){
 login.style.display="none";
 panel.style.display="block";
 load(); loadMsgs();
}

function setLive(v){localStorage.setItem("radioLive",v);}

/* TEMATIKA */
function add(){
 let s=JSON.parse(localStorage.getItem("schedule"))||[];
 s.push({from:from.value,to:to.value,name:name.value});
 localStorage.setItem("schedule",JSON.stringify(s));
 load();
}

function load(){
 let s=JSON.parse(localStorage.getItem("schedule"))||[];
 list.innerHTML="";
 s.forEach((x,i)=>{
  let d=document.createElement("div");
  d.innerHTML=`${x.from}-${x.to} ${x.name}
  <button onclick="del(${i})">X</button>`;
  list.appendChild(d);
 });
}
function del(i){
 let s=JSON.parse(localStorage.getItem("schedule"));
 s.splice(i,1);
 localStorage.setItem("schedule",JSON.stringify(s));
 load();
}

/* NAPI */
function saveDaily(){
 localStorage.setItem("dailyQ",dq.value);
 localStorage.setItem("dailyOpts",JSON.stringify([o1.value,o2.value,o3.value]));
}

/* KONTAKT */
function saveContact(){
 localStorage.setItem("contact",contactInput.value);
}

/* ÜZENET */
function loadMsgs(){
 let m=JSON.parse(localStorage.getItem("msgs"))||[];
 msgs.innerHTML="";
 m.reverse().forEach((x,i)=>{
  let d=document.createElement("div");
  d.innerHTML=`${x.name}: ${x.text}
  <button onclick="dm(${m.length-1-i})">Törlés</button>`;
  msgs.appendChild(d);
 });
}
function dm(i){
 let m=JSON.parse(localStorage.getItem("msgs"));
 m.splice(i,1);
 localStorage.setItem("msgs",JSON.stringify(m));
 loadMsgs();
}

/* AUTO */
window.onload=()=>{
 if(localStorage.getItem("admin")==="1") show();
}
</script>

</body>
</html>
