<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Admin - TikTok Rádió</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
}
h1 {
  text-align: center;
}
section {
  background: #1e1e1e;
  margin: 20px;
  padding: 15px;
  border-radius: 10px;
}
.item {
  background: #2a2a2a;
  padding: 10px;
  margin: 5px 0;
  display: flex;
  justify-content: space-between;
}
button {
  background: red;
  border: none;
  color: white;
  padding: 5px;
  cursor: pointer;
}
input {
  margin: 5px;
  padding: 5px;
}
</style>
</head>

<body>

<h1>🎧 Admin panel</h1>

<section>
<h2>🎵 Zenekérések</h2>
<div id="songs"></div>
</section>

<section>
<h2>💬 Üzenetek</h2>
<div id="messages"></div>
</section>

<section>
<h2>📅 Tematika hozzáadás</h2>
<input id="time" placeholder="Idő (pl 18:00)">
<input id="text" placeholder="Műsor">
<button onclick="addSchedule()">Mentés</button>
</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXaLcFO9bcm7DMn6UcYLFTQTlzhXhwiT0",
  authDomain: "tiktok-radi.firebaseapp.com",
  databaseURL: "https://tiktok-radi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tiktok-radi",
  storageBucket: "tiktok-radi.firebasestorage.app",
  messagingSenderId: "480663171336",
  appId: "1:480663171336:web:cf869ccc9e3e888ab3fcbd",
  measurementId: "G-S1N62DWC3X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ZENÉK */
async function loadSongs(){
songs.innerHTML="";
let q = await db.collection("songs").get();

q.forEach(d=>{
let div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<span>${d.data().song}</span>
<button onclick="deleteSong('${d.id}')">Törlés</button>
`;

songs.appendChild(div);
});
}

window.deleteSong = async (id)=>{
await db.collection("songs").doc(id).delete();
loadSongs();
};

/* ÜZENETEK */
async function loadMessages(){
messages.innerHTML="";
let q = await db.collection("messages").get();

q.forEach(d=>{
let div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<span>${d.data().text}</span>
<button onclick="deleteMsg('${d.id}')">Törlés</button>
`;

messages.appendChild(div);
});
}

window.deleteMsg = async (id)=>{
await db.collection("messages").doc(id).delete();
loadMessages();
};

/* TEMATIKA */
window.addSchedule = async ()=>{
await db.collection("schedule").add({
time: time.value,
text: text.value
});
alert("Mentve!");
};

/* BETÖLTÉS */
loadSongs();
loadMessages();

</script>

</body>
</html>
