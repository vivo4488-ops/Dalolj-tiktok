<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ADMIN</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

.box {
  background:#222;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
}

button {
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<h1>🔧 ADMIN PANEL</h1>

<button onclick="loadData()">Frissítés</button>
<button onclick="clearAll()">Összes törlése</button>

<div class="box">
<h2>📩 Üzenetek</h2>
<div id="messages"></div>
</div>

<div class="box">
<h2>🎵 Zenekérések</h2>
<div id="songs"></div>
</div>

<script>
function loadData(){
  const messages = JSON.parse(localStorage.getItem("messages") || "[]");
  const songs = JSON.parse(localStorage.getItem("songs") || "[]");

  let mHTML = "";
  messages.forEach(m => {
    mHTML += "<p>🕒 " + m.time + "<br>💬 " + m.text + "</p><hr>";
  });
  document.getElementById("messages").innerHTML = mHTML;

  let sHTML = "";
  songs.forEach(s => {
    sHTML += "<p>🕒 " + s.time + "<br>🎵 " + s.text + "</p><hr>";
  });
  document.getElementById("songs").innerHTML = sHTML;
}

function clearAll(){
  if(confirm("Biztos törlöd?")){
    localStorage.clear();
    loadData();
  }
}

loadData();
</script>

</body>
</html>
