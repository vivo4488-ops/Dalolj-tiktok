<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Admin - TikTok Rádió</title>

<style>
body { font-family: Arial; background:#111; color:white; }
section { background:#1e1e1e; margin:20px; padding:15px; border-radius:10px; }
.item { background:#2a2a2a; padding:10px; margin:5px 0; display:flex; justify-content:space-between; }
button { background:red; color:white; border:none; padding:5px; cursor:pointer; }
input { width:100%; margin:5px 0; padding:5px; }
h1 { text-align:center; }
</style>
</head>

<body>

<h1>🎧 Admin panel</h1>

<section>
<h2>🎵 Zenekérések</h2>
<div id="songs"></div>
</section>

<section>
<h2>💬 Üzenetek</h2>
<div id="messages"></div>
</section>

<section>
<h2>📅 Tematika</h2>
<input id="schTime">
<input id="schText">
<button onclick="addSchedule()">Hozzáadás</button>
<div id="scheduleList"></div>
</section>

<section>
<h2>🗳 Fix szavazás</h2>
<input id="fixedQ">
<input id="fixedA">
<input id="fixedB">
<button onclick="saveFixed()">Mentés</button>
</section>

<section>
<h2>📊 Napi szavazás</h2>
<input id="dailyQ">
<input id="dailyA">
<input id="dailyB">
<button onclick="saveDaily()">Mentés</button>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey:"AIzaSyBXaLcFO9bcm7DMn6UcYLFTQTlzhXhwiT0",
 authDomain:"tiktok-radi.firebaseapp.com",
 projectId:"tiktok-radi"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ZENE */
async function loadSongs(){
songs.innerHTML="";
let snap=await db.collection("songs").get();
snap.forEach(d=>{
songs.innerHTML+=`<div class="item">
${d.data().song}
<button onclick="db.collection('songs').doc('${d.id}').delete().then(loadSongs)">Törlés</button>
</div>`;
});
}

/* ÜZENET */
async function loadMessages(){
messages.innerHTML="";
let snap=await db.collection("messages").get();
snap.forEach(d=>{
messages.innerHTML+=`<div class="item">
${d.data().text}
<button onclick="db.collection('messages').doc('${d.id}').delete().then(loadMessages)">Törlés</button>
</div>`;
});
}

/* TEMATIKA */
async function loadSchedule(){
scheduleList.innerHTML="";
let snap=await db.collection("schedule").get();
snap.forEach(d=>{
scheduleList.innerHTML+=`<div class="item">
${d.data().time} - ${d.data().text}
<button onclick="db.collection('schedule').doc('${d.id}').delete().then(loadSchedule)">Törlés</button>
</div>`;
});
}

function addSchedule(){
db.collection("schedule").add({
time:schTime.value,
text:schText.value
}).then(loadSchedule);
}

/* FIX SZAVAZÁS */
async function loadFixed(){
let doc=await db.collection("fixed").doc("main").get();
let d=doc.data()||{q:"",o:{}};

fixedQ.value=d.q;
fixedA.value=Object.keys(d.o)[0]||"";
fixedB.value=Object.keys(d.o)[1]||"";
}

function saveFixed(){
db.collection("fixed").doc("main").set({
q:fixedQ.value,
o:{
 [fixedA.value]:0,
 [fixedB.value]:0
}
});
}

/* NAPI SZAVAZÁS (FULL FIX) */
async function loadDaily(){
let doc=await db.collection("daily").doc("main").get();
let d=doc.data()||{q:"",o:{}};

dailyQ.value=d.q;
dailyA.value=Object.keys(d.o)[0]||"";
dailyB.value=Object.keys(d.o)[1]||"";
}

function saveDaily(){
db.collection("daily").doc("main").set({
q:dailyQ.value,
o:{
 [dailyA.value]:0,
 [dailyB.value]:0
}
});
}

/* INIT */
loadSongs();
loadMessages();
loadSchedule();
loadFixed();
loadDaily();

</script>

</body>
</html>
