<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ADMIN PANEL</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}

.box{
  background:#222;
  margin:15px 0;
  padding:15px;
  border-radius:10px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#00ccff;
  cursor:pointer;
}

#status{
  font-size:30px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🎛️ ADMIN PANEL</h1>

<div class="box">
<h2>🔴 Élő adás vezérlés</h2>
<div id="status">Betöltés...</div>
<button onclick="setStatus('onair')">ON AIR</button>
<button onclick="setStatus('offair')">OFF AIR</button>
</div>

<div class="box">
<h2>📅 Tematika szerkesztés</h2>
<input id="themeInput" style="width:80%;padding:10px;"><br>
<button onclick="saveTheme()">Mentés</button>
</div>

<div class="box">
<h2>📩 Üzenetek</h2>
<div id="messages"></div>
</div>

<div class="box">
<h2>🎵 Zenekérések</h2>
<div id="songs"></div>
</div>

<button onclick="load()">🔄 Frissítés</button>

<script>

const API = "https://script.google.com/macros/s/AKfycbxmW5sHGEYVeoneaGPEoK4w8FlazjOblmOjQelxeAfITT1lU4aZ_0MHd_Vujq9Q9rftpg/exec";

let currentStatus = "offair";

function load(){
  fetch(API)
  .then(r=>r.json())
  .then(data=>{

    let msg="", song="", status="offair", theme="";

    data.forEach(row=>{
      if(row[0]==="message") msg += "💬 "+row[1]+"<br>";
      if(row[0]==="song") song += "🎵 "+row[1]+"<br>";

      if(row[0]==="status") status = row[1];
      if(row[0]==="theme") theme = row[1];
    });

    document.getElementById("messages").innerHTML = msg;
    document.getElementById("songs").innerHTML = song;

    currentStatus = status;
    document.getElementById("status").innerText =
      status === "onair" ? "🔴 ON AIR" : "⚫ OFF AIR";

    document.getElementById("themeInput").value = theme;
  });
}

function setStatus(val){
  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      type:"status",
      text: val
    })
  });
  load();
}

function saveTheme(){
  let text = document.getElementById("themeInput").value;

  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      type:"theme",
      text
    })
  });

  alert("Tematika mentve!");
}

load();

</script>

</body>
</html>
