<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ADMIN</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}
.box{
  background:#222;
  margin:20px 0;
  padding:15px;
}
button{
  padding:10px;
  background:#00ccff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🎛️ ADMIN PANEL</h1>

<button onclick="load()">Frissítés</button>

<div class="box">
<h2>📩 Üzenetek</h2>
<div id="messages"></div>
</div>

<div class="box">
<h2>🎵 Zenekérések</h2>
<div id="songs"></div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxmW5sHGEYVeoneaGPEoK4w8FlazjOblmOjQelxeAfITT1lU4aZ_0MHd_Vujq9Q9rftpg/exec";

function load(){
  fetch(API)
  .then(r=>r.json())
  .then(data=>{
    let msg="", song="";

    data.forEach(row=>{
      if(row[0]==="message") msg += "💬 "+row[1]+"<br>";
      if(row[0]==="song") song += "🎵 "+row[1]+"<br>";
    });

    document.getElementById("messages").innerHTML = msg;
    document.getElementById("songs").innerHTML = song;
  });
}

load();

</script>

</body>
</html>
