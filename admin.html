<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}

.box{
  background:#222;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input{
  width:80%;
  padding:10px;
}

button{
  padding:10px;
  margin:5px;
  background:#00ccff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🎛 ADMIN PANEL</h1>

<div class="box">
<h2>📅 Tematika</h2>
<input id="theme"><br>
<button onclick="saveTheme()">Mentés</button>
</div>

<div class="box">
<h2>🎵 Zenei stílus</h2>
<input id="style"><br>
<button onclick="saveStyle()">Mentés</button>
</div>

<div class="box">
<h2>🗳 Napi szavazás kérdés</h2>
<input id="dailyQ"><br>
<button onclick="saveDaily()">Mentés</button>
</div>

<div class="box">
<h2>🔄 Szavazás nullázása</h2>
<button onclick="reset()">RESET</button>
</div>

<script>

function saveTheme(){
  localStorage.setItem("theme",document.getElementById("theme").value);
}

function saveStyle(){
  localStorage.setItem("style",document.getElementById("style").value);
}

function saveDaily(){
  localStorage.setItem("dailyQ",document.getElementById("dailyQ").value);
}

function reset(){
  localStorage.setItem("fixedA",0);
  localStorage.setItem("fixedB",0);
  localStorage.setItem("dailyA",0);
  localStorage.setItem("dailyB",0);
}

</script>

</body>
</html>
