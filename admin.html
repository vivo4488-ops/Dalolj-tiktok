<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ADMIN - TikTok Rádió</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

section{
margin:15px auto;
width:90%;
max-width:700px;
padding:15px;
background:#222;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🔐 ADMIN PANEL</h1>

<section>
<h2>🎧 LIVE vezérlés</h2>
<button onclick="setLive('on')">ON AIR</button>
<button onclick="setLive('off')">OFF AIR</button>
</section>

<section>
<h2>💬 Üzenetek</h2>
<div id="msgs"></div>
</section>

<script>

const firebaseConfig = {
apiKey:"YOUR",
authDomain:"YOUR",
databaseURL:"YOUR",
projectId:"YOUR",
appId:"YOUR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LIVE */
function setLive(state){
db.ref("live").set(state);
}

/* ÜZENETEK */
db.ref("messages").on("value",snap=>{
let d=snap.val()||{};
let box=document.getElementById("msgs");
box.innerHTML="";

for(let i in d){
box.innerHTML+=`
<div style="border:1px solid gray;margin:5px;padding:5px">
<b>${d[i].name}</b>: ${d[i].msg}
</div>`;
}
});

</script>

</body>
</html>
