<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body>

<h1>Admin panel</h1>

<h2>Üzenetek</h2>
<ul id="msgs"></ul>

<h2>Tematika hozzáadás</h2>
<input id="time" placeholder="idő (pl 18:00)">
<input id="text" placeholder="mi lesz">
<button onclick="addSchedule()">Mentés</button>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

async function loadMsgs(){
let q=await getDocs(collection(db,"messages"));
q.forEach(d=>{
let li=document.createElement("li");
li.innerText=d.data().text;
msgs.appendChild(li);
});
}
loadMsgs();

window.addSchedule = async ()=>{
await addDoc(collection(db,"schedule"),{
time:time.value,
text:text.value
});
alert("Mentve");
};
</script>

</body>
</html>
